services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  sap-mock:
    build: mock/docker
    environment:
      - SAP_SCENARIO=${SAP_SCENARIO:-1}
    ports:
      - "2222:22"
    volumes:
      - ./.ssh-keys:/ssh-keys

volumes:
  qdrant_data:
